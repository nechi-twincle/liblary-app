<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>図書館本管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>借りた本を記録</h1>

  <input id="title" placeholder="タイトル">
  <input id="author" placeholder="著者">
  <input id="isbn" placeholder="ISBN">

  <button onclick="scanBarcode()">バーコードスキャン</button>
  <button onclick="autoFill()">ISBNから自動入力</button>
  <button onclick="saveBook()">保存</button>

  <h2>一覧</h2>
  <input id="search" placeholder="検索" oninput="renderBooks()">

  <div id="list"></div>

  <script src="app.js"></script>
</body>
</html>
